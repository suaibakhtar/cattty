<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #020617);
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      color: white;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .options {
      display: grid;
      gap: 14px;
      max-width: 420px;
      margin: 0 auto;
    }

    .option {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .option:hover {
      transform: scale(1.03);
      background: rgba(255,255,255,0.15);
    }

    .option.clicked {
      background: rgba(34,197,94,0.25);
    }

    .option-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .option-desc {
      font-size: 13px;
      color: #cbd5f5;
    }

    /* Message box */
    .message-box {
      max-width: 420px;
      margin: 30px auto 0;
      background: rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 22px;
      text-align: center;
      display: none;
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-box p {
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-line;
    }

    /* Surprise button */
    .surprise-btn {
      display: none;
      margin: 34px auto 0;
      padding: 14px 30px;
      border-radius: 999px;
      border: none;
      background: #22c55e;
      color: #020617;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
      70% { box-shadow: 0 0 0 18px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
  </style>
</head>

<body>

  <h2>Choose a Wish 🎈</h2>
  <div class="subtitle">Each one reveals something different</div>

  <!-- OPTIONS -->
  <div class="options">
    <div class="option" onclick="showMessage(1, this)">
      <div class="option-title">🌙 Soft & Calm</div>
      <div class="option-desc">Quiet and gentle</div>
    </div>

    <div class="option" onclick="showMessage(2, this)">
      <div class="option-title">💙 Honest & Simple</div>
      <div class="option-desc">Real and direct</div>
    </div>

    <div class="option" onclick="showMessage(3, this)">
      <div class="option-title">😄 Light & Playful</div>
      <div class="option-desc">A small smile</div>
    </div>

    <div class="option" onclick="showMessage(4, this)">
      <div class="option-title">✨ Warm & Thoughtful</div>
      <div class="option-desc">Carefully chosen</div>
    </div>

    <div class="option" onclick="showMessage(5, this)">
      <div class="option-title">🎂 Birthday Classic</div>
      <div class="option-desc">Timeless wish</div>
    </div>
  </div>

  <!-- MESSAGE -->
  <div class="message-box" id="messageBox">
    <p id="messageText"></p>
  </div>

  <!-- SURPRISE BUTTON -->
  <button class="surprise-btn" id="surpriseBtn" onclick="goToPDF()">
    ✨ Click here for something special
  </button>

  <script>
    const clicked = new Set();

    function showMessage(type, element) {
      const box = document.getElementById("messageBox");
      const text = document.getElementById("messageText");
      const btn = document.getElementById("surpriseBtn");

      const messages = {
        1: "Happy Birthday Catty🌙\n\n May your mind find calm,\nkind,\nclarity,& freedom from doubt.",
        2: "Happy Birthday Catty💙\n\n Just wishing you a year\nthat feels lighter\nand truly yours.igu fura chatgptr , bador ogu dekh",
        3: "Happy Birthday Catty😄\n\n Perfectly imperfect,\n lovingly dramatic.\nSome r farsina tukya bkhrte bador ogu dekh",
        4: "Happy Birthday MOINA✨\n\n may Allah keep u safe & smiling.\n thank u fr being my constant,\n once again hey brtday Mun...always yours",
        5: "Happy Birthday Catty🎂\n\n slightly toxic, highly attached\nlaughing,fighting\n but always coming back."
      };

      text.innerText = messages[type];
      box.style.display = "block";

      element.classList.add("clicked");
      clicked.add(type);

      if (clicked.size === 5) {
        btn.style.display = "block";
      }
    }

    function goToPDF() {
      window.location.href = "chat.html";
    }
  </script>

</body>
</html>
